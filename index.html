<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title> Advice generator UI</title>

  <link rel="stylesheet" href="style.css">
 
</head>
<body>
  <main>
    <header>
      <h1>ADVICE <span id="advice-id">117</span></h1>
    </header>
    <article>
      <p id="advice">"It is easy to sit up and take notice, what is difficult is getting up and taking action."

      </p>
    </article>
    <div class="divider">
      <picture>
        <source media="(max-width:768px)" srcset="./images/pattern-divider-mobile.svg">
        <img src="./images/pattern-divider-desktop.svg" alt="divider">
      </picture>
      
      </div>
      <button id="dice-button">
        <img src="./images/icon-dice.svg" alt="dice icon">
      </button>
    
  </main>
